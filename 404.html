<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fina - Redirect</title>
    <script>
      sessionStorage.redirect = location.pathname;
      location.pathname = '/Fina/web-app/';
    </script>

  <body>
    <h1>Redirecting to Fina Web App...</h1>
    <p>If you're not redirected automatically, <a href="/Fina/web-app/">click here</a>.</p>
  </body>
</html>
